<!-- Cred Bar Styles-->
<style>
    /* Target IP Section Fit to make Full Width */
    section:has(.cred-ribbon) .section-fit {
        max-width: 100vw !important;
        width: 100% !important;
    }

    /* section.section.section-relative:has(#splidePausePlay) {
        max-height: 4rem;
    } */

    /* Target IP Element to make Full Width */
    .widget:has(.cred-ribbon),
    .widget:has(.cred-ribbon) .contents {
        width: 100% !important;
        height: 100% !important;
    }

    #credRibbonSplide {
        margin: 3rem auto;
        height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2rem;
    }

    .cred-ribbon-title {
        color: #161616;
        font-size: 0.875rem;
        line-height: 130%;
        font-weight: 600;
        text-align: left;
    }

    /* Cred Ribbon Styles */
    .cred-ribbon {
        width: 100%;
        height: 100%;
        position: relative;
    }

    .cred-ribbon.splide__track {
        max-width: 59rem;
        display: flex;
        align-items: center;
    }

    .cred-ribbon-gradient {
        display: inline-block;
        width: 2.5rem;
        height: 4rem;
        position: absolute;
        left: 0;
        background: linear-gradient(270deg, rgba(255, 135, 75, 0.00) 0%, #FF874B 100%);
        z-index: 1;
    }

    .cred-ribbon-gradient:nth-of-type(2) {
        left: unset;
        right: 0;
        transform: rotateY(180deg);
    }

    /* 
    .cred-ribbon.splide__track::before {
        content: "";
        background: linear-gradient(270deg, rgba(255, 135, 75, 0.00) 0%, #FF874B 100%);
    }

    .cred-ribbon.splide__track::after {
        content: "";
        background: linear-gradient(270deg, rgba(255, 135, 75, 0.00) 0%, #FF874B 100%);
    } */

    .cred-ribbon:hover>.splide__toggle {
        opacity: 100%;
    }

    .splide__slide.cred-item {
        display: flex;
        align-items: center;
        flex-direction: row;
        justify-content: center;
        font-size: 1.125rem;
        color: #161616;
        font-weight: 500;
    }

    .cred-stars-svg {
        margin-right: 0.5rem;
    }

    .splide__slide.cred-item.bbb {
        max-width: 11.688rem !important;
    }

    .splide__slide.cred-item.moms,
    .splide__slide.cred-item.security {
        margin-right: 3rem;
    }

    .splide__slide.cred-item.usnews {
        margin-right: 1rem;
    }

    .splide__slide.cred-item.apple {
        margin-right: 3rem;
    }

    .splide__slide.cred-item.security {
        margin-right: 2.5rem;
    }

    .splide__slide.cred-item.moms {
        max-width: 19.688rem !important;
    }

    .splide__slide.cred-item.techradar {
        margin-right: 1rem;
    }

    .splide__slide.cred-item.trustpilot {
        margin-right: 0.5rem;
    }

    .cred-item.common {
        width: 10rem !important;
    }

    .cred-item.carnegie {
        width: 12rem !important;
    }

    .cred-item.family {
        width: 15rem !important;
    }

    .cred-item.jed {
        width: 6rem !important;
    }

    .cred-item.heroes {
        width: 9rem !important;
    }

    .cred-item.social-media {
        width: 20rem !important;
    }

    .cred-item.boston {
        width: 21rem !important;
    }

    .splide__toggle {
        opacity: 0%;
        width: 1.5rem;
        height: 1.5rem;
        padding: 0.25rem;
        color: #161616;
        background-color: rgba(255, 255, 255, 0.8);
        border: 1px solid #161616;
        border-radius: 200px;
        position: absolute;
        transform: translate(-50%, -50%);
        right: 22%;
        top: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2;
        transition-timing-function: ease;
        transition-duration: 200ms;
    }

    .splide__toggle__play {
        margin-left: 0.15rem;
    }

    .splide__toggle:hover {
        color: #ffffff;
        background-color: #161616;
        opacity: 100%;
    }

    .splide__toggle:focus-visible {
        color: #ffffff;
        background-color: #161616;
        opacity: 100%;
    }

    #credRibbonSplide .splide__slide img {
        max-height: 100%;
        width: auto;
        object-fit: contain;
    }

    /*DESKTOP SPLIDE PAGINATION*/
    #credRibbonSplide .splide__pagination {
        display: none;
    }

    @media (max-width: 767px) {

        #credRibbonSplide {
            margin: 0;
            height: 100%;
            flex-direction: column;
            gap: 0;
            padding-top: 1rem;
        }

        .splide__list.cred-ribbon {
            gap: 2rem;
        }

        .splide__toggle {
            opacity: 100%;
            right: 2%;
        }

        .splide__slide.cred-item {
            width: auto !important
        }

        .cred-item.common {
            width: auto !important;
        }

        .cred-item.carnegie {
            width: auto !important;
        }

        .cred-item.family {
            width: auto !important;
        }

        .cred-item.jed {
            width: auto !important;
        }

        .cred-item.heroes {
            width: auto !important;
        }

        .cred-item.social-media {
            width: auto !important;
        }

        .cred-item.boston {
            width: auto !important;
        }


        .cred-ribbon-title {
            text-align: center;
        }
    }
</style>

<!-- Cred Bar Splide JS-->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const playPauseButton = document.querySelector("#splidePausePlay");
        const credRibbonSplide = new Splide("#credRibbonSplide", {
            type: "loop",
            drag: "free",
            pauseOnHover: true,
            focus: "center",
            gap: "0rem",
            perPage: 5,
            fixedWidth: "12rem",
            pagination: true,
            arrows: false,
            height: "100%",
            width: "auto",
            autoScroll: {
                pauseOnHover: false,
                pauseOnFocus: false,
                useToggleButton: true,
                speed: 0.78,
            },
            breakpoints: {
                769: {
                    fixedWidth: "13rem",
                    gap: "0rem",
                    perPage: 5,
                    autoScroll: {
                        speed: 0.65,
                    },
                },
            },
        });
        credRibbonSplide.mount(window.splide.Extensions);
    });
</script>
