<!-- TrustPilot Dynamic Review Script -->
<script>
    let currentScriptTpDynamic = document.currentScript;
    ("use strict");
    //This variable is the Splide container where the carousel will go
    //Carousel is generated as HTML later in this script
    const splideContainer = document.querySelector(
        ".trustpilot-dynamic-splide-list"
    );

    document.addEventListener("DOMContentLoaded", function () {
        // getTrustPilotTaggedReviews();

        //Main HTML is used to add modals
        const main = document.querySelector("main");
        //Make our stars based on their color! Thanks, Josh.
        function starSvgFactory(starColor) {
            return ` <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M11.5277 1.35869C11.6834 0.910915 12.3166 0.910913 12.4723 1.35869L14.7071 7.78807C14.7758 7.98561 14.9601 8.11955 15.1692 8.12381L21.9745 8.26249C22.4485 8.27215 22.6442 8.87442 22.2664 9.16082L16.8423 13.2731C16.6757 13.3994 16.6053 13.6161 16.6658 13.8163L18.6369 20.3314C18.7742 20.7851 18.2618 21.1574 17.8727 20.8866L12.2856 16.9987C12.1139 16.8793 11.8861 16.8793 11.7144 16.9987L6.12728 20.8866C5.73816 21.1574 5.22584 20.7851 5.36311 20.3314L7.33418 13.8163C7.39473 13.6161 7.32432 13.3994 7.15767 13.2731L1.73357 9.16082C1.35581 8.87442 1.5515 8.27215 2.02546 8.26249L8.83077 8.12381C9.03986 8.11955 9.2242 7.98561 9.29287 7.78808L11.5277 1.35869Z"
        fill="#161616" />
    </svg>`;
        }

        function modalFactory(starColor, reviewObject, modalDiv) {
            //Modal HTML
            let modalHtml = `
  <div class="review-modal">
    <div class="tp-dynamic-card-background tp-dynamic-card-background-modal">
      <div class="tp-dynamic-card-container tp-dynamic-card-container-modal">
        <div class="tp-dynamic-modal-exit-button-wrapper" id=${reviewObject.reviewId
                }-exit tabindex="0" role="button">
          <img class="tp-dynamic-modal-exit-button" src="https://v.fastcdn.co/u/bff2cbd9/64736864-0-X-shape.svg"/>
        </div>
        <div class="aura-trustpilot-rating layout-desktop-inline star-size-desktop-24 star-size-mobile-24 undefined star-position-mobile-top">
        <div class="aura-trustpilot-rating-stars-wrapper aura-trustpilot-rating-stars-wrapper-modal" role="img" aria-label="5 star rating">

          <div class="aura-trustpilot-rating-star">
      <div class="aura-trustpilot-rating-star-wrapper-icon" style="color: ${starColor}">${starSvgFactory(
                    starColor
                )}</div>
    </div>
  <div class="aura-trustpilot-rating-star">
      <div class="aura-trustpilot-rating-star-wrapper-icon"  style="color: ${starColor}">${starSvgFactory(
                    starColor
                )}</div>
    </div>
  <div class="aura-trustpilot-rating-star">
      <div class="aura-trustpilot-rating-star-wrapper-icon"  style="color: ${starColor}">${starSvgFactory(
                    starColor
                )}</div>
    </div>
  <div class="aura-trustpilot-rating-star">
      <div class="aura-trustpilot-rating-star-wrapper-icon" style="color: ${starColor}">${starSvgFactory(
                    starColor
                )}</div>
    </div>
  <div class="aura-trustpilot-rating-star">
      <div class="aura-trustpilot-rating-star-wrapper-icon" style="color: ${starColor}">${starSvgFactory(
                    starColor
                )}</div>
    </div>
    </div>
          </div>
        <div class="tp-dynamic-card-text-container card-text-container-modal">
          <p class="tp-dynamic-card-text tp-dynamic-card-text-modal">${reviewObject.reviewParagraph
                }</p>
          <div class="tp-dynamic-date-wrapper">
            <p class="tp-dynamic-author-text">— ${reviewObject.reviewAuthor}</p>
            <p class="tp-dynamic-created-at-text">Trustpilot, ${reviewObject.reviewDate
                }</p>
          </div>
        </div>
      </div>

    </div>
  </div>
  `;

            //Create modal HTML object and add it to top of the Main HTML element
            modalDiv.id = reviewObject.reviewId + "-modal";
            modalDiv.classList.add("review-modal-background");
            let modalGuts = document.createElement("div");
            modalGuts.classList.add("modal-guts");
            modalGuts.innerHTML = modalHtml;
            modalDiv.appendChild(modalGuts);
            // modalDiv.style.display = "none";

            const handleModalInsertion = (divToInsert) => {
                let isSectionBlock = false;

                let currentElementToCheck = currentScriptTpDynamic.parentElement;

                while (!isSectionBlock) {
                    if (currentElementToCheck.nodeName === "SECTION") {
                        isSectionBlock = true;
                    } else {
                        currentElementToCheck = currentElementToCheck.parentElement;
                    }
                }

                currentElementToCheck.after(divToInsert);
            };

            handleModalInsertion(modalDiv);

            let closeButton = document.getElementById(
                `${reviewObject.reviewId}-exit`
            );
            closeButton.setAttribute(
                "aria-label",
                `Close ${reviewObject.reviewAuthor}'s review of Aura`
            );
            closeButton.addEventListener("click", () => {
                modalDiv.close();
            });

            closeButton.addEventListener("keydown", (event) => {
                const { key, which } = event;
                const keysToMatch = ["Enter", " "];
                const whichCodesToMatch = [32, 13];

                if (keysToMatch.includes(key) || whichCodesToMatch.includes(which)) {
                    modalDiv.close();
                }
            });
        }

        function slideFactory(starColor, reviewObject, modalDiv) {
            //Generate Splide card/slide HTML
            let slideHtml = `
  <div class="tp-dynamic-card-background">
    <div class="tp-dynamic-card-container">
      <div class="aura-trustpilot-rating layout-desktop-inline star-size-desktop-24 star-size-mobile-24 undefined star-position-mobile-top">
      <div class="aura-trustpilot-rating-stars-wrapper rating-stars-review-wrapper" role="img" aria-label="5 Stars">
        <div class="aura-trustpilot-rating-star">
          <div class="aura-trustpilot-rating-star-wrapper-icon" style="color: ${starColor}">${starSvgFactory(
                starColor
            )}</div>
  </div>
          <div class="aura-trustpilot-rating-star">
            <div class="aura-trustpilot-rating-star-wrapper-icon" style="color: ${starColor}">${starSvgFactory(
                starColor
            )}</div>
          </div>
        <div class="aura-trustpilot-rating-star">
            <div class="aura-trustpilot-rating-star-wrapper-icon" style="color: ${starColor}">${starSvgFactory(
                starColor
